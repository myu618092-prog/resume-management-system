services:
  postgres:
    image: postgres:16-alpine
    container_name: internship-postgres
    environment:
      POSTGRES_DB: internship_tracker
      POSTGRES_USER: internship
      POSTGRES_PASSWORD: internship
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U internship -d internship_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: internship-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: internship-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/internship_tracker
      SPRING_DATASOURCE_USERNAME: internship
      SPRING_DATASOURCE_PASSWORD: internship
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: change-this-secret-in-production-change-this-secret
      APP_UPLOAD_DIR: /app/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: internship-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
