spring:
  application:
    name: internship-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/internship_tracker}
    username: ${SPRING_DATASOURCE_USERNAME:internship}
    password: ${SPRING_DATASOURCE_PASSWORD:internship}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-change-this-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4.1-mini}
